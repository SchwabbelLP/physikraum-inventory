<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Dashboard - Physikraum Inventory</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-speedometer2"></i> Dashboard</h1>
        </div>

        <!-- Statistics Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <h3 class="text-primary" th:text="${totalItems}">0</h3>
                        <p>Gegenstände</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <h3 class="text-success" th:text="${totalCategories}">0</h3>
                        <p>Kategorien</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <h3 class="text-info" th:text="${totalSubcategories}">0</h3>
                        <p>Unterkategorien</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <h3 class="text-warning" th:text="${lowStockItems}">0</h3>
                        <p>Niedrige Bestände</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Items -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-clock-history"></i> Zuletzt hinzugefügt</h5>
                <a th:href="@{/items}" class="btn btn-sm btn-primary">Alle anzeigen</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Kategorie</th>
                                <th>Anzahl</th>
                                <th>Ort</th>
                                <th>Hinzugefügt</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${recentItems}">
                                <td th:text="${item.name}">Item Name</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${item.category.name}">Category</span>
                                </td>
                                <td>
                                    <span class="quantity-display" th:classappend="${item.quantity == 0} ? 'quantity-zero'" th:text="${item.quantity}">0</span>
                                </td>
                                <td>
                                    <span class="badge badge-location bg-light text-dark" th:text="${item.location}">Location</span>
                                </td>
                                <td th:text="${#temporals.format(item.createdAt, 'dd.MM.yyyy HH:mm')}">Date</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(recentItems)}">
                                <td colspan="5" class="text-center text-muted">Keine Gegenstände vorhanden</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
