<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body">
<body>
<h2>Benutzer</h2>
<a th:href="@{/users/create}">Neu</a>
<table>
    <tr><th>Benutzername</th><th>Rolle</th></tr>
    <tr th:each="u : ${users}">
        <td th:text="${u.username}"></td>
        <td th:text="${u.role}"></td>
    </tr>
</table>
</body>
</html>
