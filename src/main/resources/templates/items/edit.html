<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body">
<body>
<h2>Gegenstand bearbeiten</h2>
<form th:action="@{'/items/' + ${item.id}}" method="post" th:object="${item}">
    <div>
        <label>Name</label>
        <input type="text" th:field="*{name}" />
    </div>
    <div>
        <label>Menge</label>
        <input type="number" th:field="*{quantity}" />
    </div>
    <button type="submit">Speichern</button>
</form>
</body>
</html>
