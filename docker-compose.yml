version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  app:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-inventory}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-inventory}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
    ports:
      - "8080:8080"
    depends_on:
      - db
volumes:
  db_data:
